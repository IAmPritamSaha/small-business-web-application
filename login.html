<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — PS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <a href="index.html" class="back-link">← Back to Home</a>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="auth-logo">PS</div>
    </div>
    <div class="auth-box">
      <h2>Sign In</h2>
      <p class="auth-sub">Access your account</p>
      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login_email" placeholder="sahapritam968@gmail.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pass-wrap">
            <input type="password" id="login_password" placeholder="Your password" required/>
            <button type="button" class="eye-btn" onclick="togglePassword('login_password',this)" aria-label="Show or hide password">
              <i class="fa-regular fa-eye" aria-hidden="true"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn1 full-width">Sign In</button>
        <div id="login-status" class="form-status"></div>
      </form>
      <p class="auth-switch">Don't have an account? <a href="register.html">Register free</a></p>
    </div>
  </div>

  <script src="authentication.js"></script>
</body>
</html>
