<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — PS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <a href="index.html" class="back-link">← Back to Home</a>

  <div class="auth-container">
    <div class="auth-brand">
      <div class="auth-logo">PS</div>
      <div class="auth-orb"></div>
    </div>
    <div class="auth-box">
      <h2>Create Account</h2>
      <p class="auth-sub">Create a new account</p>
      <form id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg_name" placeholder="Pritam Saha" required/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="reg_email" placeholder="sahapritam968@gmail.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="pass-wrap">
            <input type="password" id="reg_password" placeholder="Min 6 characters" required/>
            <button type="button" class="eye-btn" onclick="togglePassword('reg_password',this)" aria-label="Show or hide password">
              <i class="fa-regular fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <div class="password-strength" id="strengthBar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <div class="strength-text" id="strengthText"></div>
        </div>
        <button type="submit" class="btn1 full-width">Create Account</button>
        <div id="reg-status" class="form-status"></div>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script src="authentication.js"></script>
</body>
</html>
